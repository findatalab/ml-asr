<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSRNN Denoising MVP</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .controls { margin: 20px 0; padding: 15px; background: #f4f4f4; border-radius: 8px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; }
        #recordBtn { background: #e74c3c; color: white; }
        #stopBtn { background: #7f8c8d; color: white; }
        #stopBtn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .result-block { margin-top: 20px; display: none; }
        audio { width: 100%; margin-top: 5px; }
        .status { font-weight: bold; color: #2980b9; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Speech Enhancement (BSRNN)</h2>
    
    <div class="controls">
        <label for="noiseSelect">Выберите тип шума:</label>
        <select id="noiseSelect">
            <option value="babble">Babble (Голоса на фоне)</option>
            <option value="rir">RIR (Реверберация/Эхо)</option>
            <option value="white">White (Белый шум)</option>
        </select>
        
        <div style="margin-top: 15px;">
            <button id="recordBtn">🎤 Начать запись</button>
            <button id="stopBtn" disabled>⏹ Остановить и обработать</button>
        </div>
        <div id="statusText" class="status"></div>
    </div>

    <div class="result-block" id="results">
        <h3>Оригинал (Clean)</h3>
        <audio id="audioClean" controls></audio>

        <h3>С шумом (Noisy)</h3>
        <audio id="audioNoisy" controls></audio>

        <h3>Очищенное (Denoised)</h3>
        <audio id="audioDenoised" controls></audio>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];

        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const noiseSelect = document.getElementById('noiseSelect');
        const statusText = document.getElementById('statusText');
        const resultsDiv = document.getElementById('results');

        recordBtn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = sendAudio;
            mediaRecorder.start();

            recordBtn.disabled = true;
            stopBtn.disabled = false;
            statusText.innerText = "Идет запись... Говорите.";
            resultsDiv.style.display = 'none';
        };

        stopBtn.onclick = () => {
            mediaRecorder.stop();
            recordBtn.disabled = false;
            stopBtn.disabled = true;
            statusText.innerText = "Обработка моделью... Пожалуйста, подождите.";
        };

        async function sendAudio() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('audio', audioBlob, 'recording.webm');
            formData.append('noise_type', noiseSelect.value);

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (response.ok) {
                    document.getElementById('audioClean').src = data.clean;
                    document.getElementById('audioNoisy').src = data.noisy;
                    document.getElementById('audioDenoised').src = data.denoised;
                    resultsDiv.style.display = 'block';
                    statusText.innerText = "Готово!";
                } else {
                    statusText.innerText = "Ошибка: " + data.error;
                }
            } catch (err) {
                statusText.innerText = "Ошибка сети: " + err;
            }
        }
    </script>
</body>
</html>
